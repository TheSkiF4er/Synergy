<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <h1>Калькулятор</h1>
        <input type="text" id="num1" placeholder="Введите первое число">
        <input type="text" id="num2" placeholder="Введите второе число">
        <div class="buttons">
            <button id="sum">Сумма</button>
            <button id="subtract">Разность</button>
            <button id="multiply">Произведение</button>
            <button id="divide">Деление</button>
        </div>
        <div id="result">Результат: </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
