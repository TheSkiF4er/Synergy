<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sr-only" id="sr-status" aria-live="polite"></div>
        <div id="result" class="result" role="status" aria-live="polite" aria-atomic="true">0</div>
        <div class="buttons">
            <button id="minus" type="button" aria-label="Уменьшить значение">Минус</button>
            <button id="plus" type="button" aria-label="Увеличить значение">Плюс</button>
        </div>
        <div id="message" class="message" role="alert" aria-live="assertive"></div>
    </div>

    <script type="module" src="src/ui/app.js"></script>
</body>
</html>
