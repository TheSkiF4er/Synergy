{% extends "greeting/base.html" %}
{% block title %}Greeting App · Delete{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm rounded-4 border border-danger-subtle">
        <div class="card-body p-4">
          <h1 class="h4 mb-2">Delete user</h1>
          <p class="text-muted">Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>

          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, delete</button>
            <a class="btn btn-outline-secondary ms-2" href="{% url 'greetings' %}">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
